<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0c29" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ada" />
  <meta name="description" content="Ada - Kişisel AI Asistanın" />
  <title>Ada — Kişisel Asistanın</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0c29;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.1);
      --text: rgba(255,255,255,0.9);
      --text-muted: rgba(255,255,255,0.45);
      --accent1: #7c3aed;
      --accent2: #db2777;
      --gradient: linear-gradient(135deg, #7c3aed, #db2777);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
      color: var(--text);
    }

    body {
      background: linear-gradient(135deg, #0f0c29 0%, #1a1040 50%, #0d1b2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .blob1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 70%);
      top: -120px; left: -120px;
      animation: blobFloat 7s ease-in-out infinite;
    }
    .blob2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(236,72,153,0.12) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      animation: blobFloat 9s ease-in-out infinite reverse;
    }
    .blob3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
      top: 50%; left: 60%;
      animation: blobFloat 11s ease-in-out infinite;
    }

    @keyframes blobFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* App container */
    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar-ring {
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: var(--gradient);
      z-index: 0;
    }
    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 19px;
      position: relative; z-index: 1;
      border: 2px solid #0f0c29;
    }
    .online-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #22c55e;
      border: 2px solid #0f0c29;
      z-index: 2;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.6; }
    }

    .header-name { color: white; font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
    .header-sub { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    #messages::-webkit-scrollbar { display: none; }

    .msg-row {
      display: flex;
      align-items: flex-start;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai { justify-content: flex-start; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 13px;
      flex-shrink: 0;
      margin-right: 8px;
      margin-top: 2px;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.ai {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px 18px 18px 18px;
      color: var(--text);
    }
    .bubble.user {
      background: var(--gradient);
      border-radius: 18px 4px 18px 18px;
      color: white;
      box-shadow: 0 4px 20px rgba(139,92,246,0.35);
    }

    /* Typing dots */
    .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-7px); opacity: 1; }
    }

    /* Suggestions */
    #suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 16px 10px;
    }
    .sugg-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      padding: 7px 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .sugg-btn:active { background: rgba(255,255,255,0.12); }

    /* Input area */
    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 12px 16px;
      color: white;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #user-input::placeholder { color: rgba(255,255,255,0.3); }
    #user-input::-webkit-scrollbar { display: none; }

    #send-btn {
      width: 46px; height: 46px;
      border-radius: 14px;
      background: var(--gradient);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(139,92,246,0.4);
      -webkit-tap-highlight-color: transparent;
    }
    #send-btn:disabled { opacity: 0.4; }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }

    /* Message animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-row { animation: fadeUp 0.25s ease; }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div id="app">
  <!-- Header -->
  <div id="header">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar">A</div>
      <div class="online-dot"></div>
    </div>
    <div>
      <div class="header-name">Ada</div>
      <div class="header-sub">Kişisel Asistanın ✨</div>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages"></div>

  <!-- Suggestions -->
  <div id="suggestions">
    <button class="sugg-btn" onclick="sendSugg(this)">Merhaba Ada, kendini tanıt! 👋</button>
    <button class="sugg-btn" onclick="sendSugg(this)">Bana motivasyon ver 💪</button>
    <button class="sugg-btn" onclick="sendSugg(this)">İş başvurusu e-postası yaz ✉️</button>
    <button class="sugg-btn" onclick="sendSugg(this)">Yapay zeka nedir? 🤖</button>
  </div>

  <!-- Input -->
  <div id="input-area">
    <textarea id="user-input" placeholder="Ada'ya bir şey sor..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const SYSTEM_PROMPT = `Sen "Ada" adında samimi ve arkadaşça bir kişisel asistansın. Kullanıcıyla sıcak, doğal ve içten bir şekilde konuşursun. Türkçe konuşursun.

Uzmanlık alanların:
- Genel soru-cevap: Her türlü konuda yardımcı olursun, anlaşılır şekilde açıklarsın.
- Yazışma & metin yazma: E-posta, mesaj, dilekçe, özgeçmiş gibi her türlü metni yazarsın.

Kişilik:
- Samimi ve sıcak: "Tabii ki!", "Hemen bakayım!" gibi doğal tepkiler verirsin.
- Kısa ve öz: Net, sade, anlaşılır cevaplar verirsin.
- Emojileri doğal kullanırsın ama aşırıya kaçmazsın.`;

  const API_KEY = "YOUR_API_KEY_HERE"; // <-- Buraya kendi Anthropic API anahtarını gir

  let history = [];
  let loading = false;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const suggestionsEl = document.getElementById("suggestions");

  // İlk mesaj
  addMessage("assistant", "Merhaba! Ben Ada, senin kişisel asistanın 🌟 Sana nasıl yardımcı olabilirim?");

  // Input olayları
  inputEl.addEventListener("input", () => {
    sendBtn.disabled = !inputEl.value.trim() || loading;
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  function sendSugg(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || loading) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    loading = true;

    // Öneri butonlarını gizle
    suggestionsEl.style.display = "none";

    addMessage("user", text);
    history.push({ role: "user", content: text });

    // Typing indicator
    const typingId = addTyping();

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });

      const data = await res.json();
      const reply = data.content?.map(b => b.text || "").join("") || "Bir şeyler ters gitti 😅";

      removeTyping(typingId);
      addMessage("assistant", reply);
      history.push({ role: "assistant", content: reply });

    } catch (err) {
      removeTyping(typingId);
      addMessage("assistant", "Ups, bir hata oluştu. İnternet bağlantını kontrol eder misin? 🙈");
    }

    loading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function addMessage(role, text) {
    const row = document.createElement("div");
    row.className = `msg-row ${role === "user" ? "user" : "ai"}`;

    if (role === "assistant") {
      const av = document.createElement("div");
      av.className = "msg-avatar";
      av.textContent = "A";
      row.appendChild(av);
    }

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role === "user" ? "user" : "ai"}`;
    bubble.textContent = text;
    row.appendChild(bubble);

    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function addTyping() {
    const id = "typing-" + Date.now();
    const row = document.createElement("div");
    row.className = "msg-row ai";
    row.id = id;

    const av = document.createElement("div");
    av.className = "msg-avatar";
    av.textContent = "A";

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML = `<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;

    row.appendChild(av);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
</body>
</html>
