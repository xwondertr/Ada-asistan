<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0d0d0d"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Sevgilim"/>
  <title>Sevgilim 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0d0d0d;
      --card:rgba(255,255,255,0.05);
      --border:rgba(255,255,255,0.1);
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.4);
      --accent:#ff6b9d;
      --accent2:#c084fc;
      --gradient:linear-gradient(135deg,#ff6b9d,#c084fc);
      --gradient2:linear-gradient(135deg,#667eea,#764ba2);
    }
    html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);}

    /* ── SETUP SCREEN ── */
    #setup{
      position:fixed;inset:0;z-index:100;
      background:linear-gradient(160deg,#0d0d0d 0%,#1a0a2e 50%,#0d0d0d 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px;overflow-y:auto;
    }
    #setup h1{font-family:'Pacifico',cursive;font-size:32px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;text-align:center;}
    #setup p.sub{color:var(--muted);font-size:14px;margin-bottom:32px;text-align:center;}
    .setup-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:20px;width:100%;max-width:420px;margin-bottom:16px;}
    .setup-card label{display:block;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
    .setup-input{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;}
    .setup-input::placeholder{color:rgba(255,255,255,0.25);}

    /* Gender toggle */
    .gender-row{display:flex;gap:10px;}
    .gender-btn{flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);font-family:inherit;font-size:15px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
    .gender-btn.active{background:var(--gradient);border-color:transparent;color:white;font-weight:700;}

    /* Personality chips */
    .chip-row{display:flex;flex-wrap:wrap;gap:8px;}
    .chip{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
    .chip.active{background:var(--gradient);border-color:transparent;color:white;font-weight:700;}

    /* Avatar upload */
    .avatar-upload{width:88px;height:88px;border-radius:50%;border:2px dashed rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:rgba(255,255,255,0.04);transition:border-color .2s;margin:0 auto;}
    .avatar-upload:hover{border-color:var(--accent);}
    .avatar-upload img{width:100%;height:100%;object-fit:cover;}
    .avatar-upload span{color:var(--muted);font-size:28px;}
    #avatar-file{display:none;}

    /* Start button */
    #start-btn{width:100%;max-width:420px;padding:16px;border-radius:16px;background:var(--gradient);border:none;color:white;font-family:inherit;font-size:17px;font-weight:800;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s;-webkit-tap-highlight-color:transparent;}
    #start-btn:active{transform:scale(0.97);}

    /* ── CHAT SCREEN ── */
    #chat{position:fixed;inset:0;display:none;flex-direction:column;background:linear-gradient(160deg,#0d0d0d 0%,#1a0a2e 60%,#0d0d0d 100%);}

    /* Blobs */
    .blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
    .b1{width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,157,.15) 0%,transparent 70%);top:-100px;left:-100px;animation:bf 8s ease-in-out infinite;}
    .b2{width:350px;height:350px;background:radial-gradient(circle,rgba(192,132,252,.12) 0%,transparent 70%);bottom:-80px;right:-80px;animation:bf 10s ease-in-out infinite reverse;}
    @keyframes bf{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-25px) scale(1.04);}}

    /* Header */
    #chat-header{
      position:relative;z-index:2;
      display:flex;align-items:center;gap:12px;
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(20px);
      flex-shrink:0;
    }
    #chat-avatar{
      width:44px;height:44px;border-radius:50%;
      background:var(--gradient);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;font-weight:800;color:white;
      flex-shrink:0;overflow:hidden;
      border:2px solid rgba(255,255,255,0.15);
      position:relative;
    }
    #chat-avatar img{width:100%;height:100%;object-fit:cover;}
    .online-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #0d0d0d;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:.6;}}
    #chat-name{color:white;font-weight:800;font-size:16px;}
    #chat-status{color:var(--muted);font-size:12px;margin-top:1px;}
    .edit-btn{margin-left:auto;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:10px;padding:7px 12px;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

    /* Messages */
    #messages{flex:1;overflow-y:auto;padding:16px 14px 8px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;-webkit-overflow-scrolling:touch;}
    #messages::-webkit-scrollbar{display:none;}

    .msg-row{display:flex;align-items:flex-end;animation:fadeUp .22s ease;}
    .msg-row.ai{justify-content:flex-start;}
    .msg-row.user{justify-content:flex-end;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    .msg-av{width:28px;height:28px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;flex-shrink:0;margin-right:7px;overflow:hidden;}
    .msg-av img{width:100%;height:100%;object-fit:cover;}

    .bubble{max-width:75%;padding:11px 15px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;position:relative;}
    .bubble.ai{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px 18px 18px 18px;color:var(--text);}
    .bubble.user{background:var(--gradient);border-radius:18px 4px 18px 18px;color:white;box-shadow:0 4px 18px rgba(255,107,157,.3);}

    /* Special days badge */
    .day-badge{background:rgba(255,107,157,.12);border:1px solid rgba(255,107,157,.25);border-radius:12px;padding:10px 14px;font-size:13px;color:#ff9ec5;text-align:center;margin:4px 0;}

    /* Typing */
    .typing{display:flex;gap:4px;align-items:center;padding:3px 0;}
    .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.55);animation:bounce 1.2s ease-in-out infinite;}
    .dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-6px);opacity:1;}}

    /* Suggestions */
    #suggestions{display:flex;flex-wrap:wrap;gap:7px;padding:4px 14px 8px;position:relative;z-index:1;}
    .sugg{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:18px;color:rgba(255,255,255,.7);font-size:12px;padding:6px 12px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:background .2s;}
    .sugg:active{background:rgba(255,255,255,.12);}

    /* Input */
    #input-area{display:flex;align-items:flex-end;gap:9px;padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--border);background:rgba(255,255,255,0.02);position:relative;z-index:2;flex-shrink:0;}
    #user-input{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:12px 15px;color:white;font-size:15px;font-family:inherit;resize:none;outline:none;line-height:1.5;max-height:110px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    #user-input::placeholder{color:rgba(255,255,255,.28);}
    #user-input::-webkit-scrollbar{display:none;}
    #send-btn{width:44px;height:44px;border-radius:13px;background:var(--gradient);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s,transform .1s;box-shadow:0 4px 14px rgba(255,107,157,.4);-webkit-tap-highlight-color:transparent;}
    #send-btn:disabled{opacity:.4;}
    #send-btn:active:not(:disabled){transform:scale(.92);}

    /* Special day reminder modal */
    #reminder-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px;}
    #reminder-modal.show{display:flex;}
    .modal-box{background:#1a0a2e;border:1px solid rgba(255,107,157,.3);border-radius:24px;padding:24px;width:100%;max-width:380px;}
    .modal-box h3{font-size:18px;font-weight:800;color:white;margin-bottom:16px;text-align:center;}
    .modal-input{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:12px;padding:11px 13px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;}
    .modal-row{display:flex;gap:10px;}
    .modal-btn{flex:1;padding:12px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .modal-btn.cancel{background:rgba(255,255,255,.07);color:var(--muted);}
    .modal-btn.save{background:var(--gradient);color:white;}

    /* Days list */
    #days-list{max-height:150px;overflow-y:auto;margin-bottom:12px;}
    .day-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;color:var(--text);}
    .day-del{background:none;border:none;color:rgba(255,107,157,.6);cursor:pointer;font-size:16px;}
  </style>
</head>
<body>

<!-- ══════════════ SETUP SCREEN ══════════════ -->
<div id="setup">
  <h1>Sevgilim 💕</h1>
  <p class="sub">Sana özel asistanını tasarla</p>

  <!-- Avatar -->
  <div class="setup-card">
    <label>Fotoğraf / Avatar</label>
    <div class="avatar-upload" onclick="document.getElementById('avatar-file').click()">
      <span id="av-placeholder">📷</span>
      <img id="av-preview" style="display:none"/>
    </div>
    <input type="file" id="avatar-file" accept="image/*"/>
    <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:8px;">Fotoğraf seç (isteğe bağlı)</p>
  </div>

  <!-- Name -->
  <div class="setup-card">
    <label>İsim</label>
    <input class="setup-input" id="s-name" placeholder="Örn: Asel, Mert, Luna..." maxlength="20"/>
  </div>

  <!-- Gender -->
  <div class="setup-card">
    <label>Cinsiyet</label>
    <div class="gender-row">
      <button class="gender-btn active" data-g="kız" onclick="selectGender(this)">👧 Kız</button>
      <button class="gender-btn" data-g="erkek" onclick="selectGender(this)">👦 Erkek</button>
    </div>
  </div>

  <!-- Personality -->
  <div class="setup-card">
    <label>Kişilik (birden fazla seçebilirsin)</label>
    <div class="chip-row">
      <button class="chip active" data-p="romantik">❤️ Romantik</button>
      <button class="chip" data-p="neşeli">😄 Neşeli</button>
      <button class="chip" data-p="sakin">🌙 Sakin</button>
      <button class="chip" data-p="tutkulu">🔥 Tutkulu</button>
      <button class="chip" data-p="koruyucu">🛡️ Koruyucu</button>
      <button class="chip" data-p="eğlenceli">🎉 Eğlenceli</button>
    </div>
  </div>

  <!-- Your name -->
  <div class="setup-card">
    <label>Senin ismin (asistan sana böyle seslensin)</label>
    <input class="setup-input" id="s-myname" placeholder="Adın..." maxlength="20"/>
  </div>

  <button id="start-btn" onclick="startChat()">💕 Başla</button>
</div>

<!-- ══════════════ CHAT SCREEN ══════════════ -->
<div id="chat">
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div id="chat-header">
    <div id="chat-avatar" style="position:relative;">
      <span id="ca-text">💕</span>
      <img id="ca-img" style="display:none;width:100%;height:100%;object-fit:cover;"/>
      <div class="online-dot"></div>
    </div>
    <div>
      <div id="chat-name">Sevgilim</div>
      <div id="chat-status">Seninle burada 💕</div>
    </div>
    <button class="edit-btn" onclick="openReminderModal()">📅 Özel Günler</button>
  </div>

  <div id="messages"></div>
  <div id="suggestions"></div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Yaz..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- Special Days Modal -->
<div id="reminder-modal">
  <div class="modal-box">
    <h3>📅 Özel Günler</h3>
    <div id="days-list"></div>
    <input class="modal-input" id="day-name-input" placeholder="Özel gün adı (örn: Doğum günün)"/>
    <input class="modal-input" id="day-date-input" type="date"/>
    <div class="modal-row">
      <button class="modal-btn cancel" onclick="closeReminderModal()">İptal</button>
      <button class="modal-btn save" onclick="addSpecialDay()">💾 Kaydet</button>
    </div>
  </div>
</div>

<script>
const API_KEY = "vlt_011CaoTfKq7m2g1b1v1SU5KS"; // <-- Anthropic API anahtarını buraya gir

let profile = { name:"", gender:"kız", personalities:["romantik"], myName:"", avatarData:null };
let history = [];
let loading = false;
let specialDays = JSON.parse(localStorage.getItem("specialDays")||"[]");

// ── Avatar upload ──
document.getElementById("avatar-file").addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    profile.avatarData = e.target.result;
    document.getElementById("av-placeholder").style.display = "none";
    const img = document.getElementById("av-preview");
    img.src = e.target.result;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
});

// ── Gender select ──
function selectGender(btn){
  document.querySelectorAll(".gender-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  profile.gender = btn.dataset.g;
}

// ── Personality chips ──
document.querySelectorAll(".chip").forEach(c=>{
  c.addEventListener("click",()=>{
    c.classList.toggle("active");
  });
});

// ── Start ──
function startChat(){
  const name = document.getElementById("s-name").value.trim();
  const myName = document.getElementById("s-myname").value.trim();
  if(!name){ alert("Lütfen bir isim gir 💕"); return; }

  profile.name = name;
  profile.myName = myName || "canım";
  profile.personalities = [...document.querySelectorAll(".chip.active")].map(c=>c.dataset.p);
  if(!profile.personalities.length) profile.personalities = ["romantik"];

  // Set chat header
  document.getElementById("chat-name").textContent = profile.name;
  const pronoun = profile.gender === "kız" ? "sevgilinin" : "sevgilinin";
  document.getElementById("chat-status").textContent = `${profile.name} seninle burada 💕`;

  // Avatar
  if(profile.avatarData){
    document.getElementById("ca-text").style.display = "none";
    const img = document.getElementById("ca-img");
    img.src = profile.avatarData;
    img.style.display = "block";
  } else {
    document.getElementById("ca-text").textContent = profile.gender==="kız" ? "👧" : "👦";
  }

  document.getElementById("setup").style.display = "none";
  document.getElementById("chat").style.display = "flex";

  checkSpecialDays();
  showSuggestions();

  const genderStr = profile.gender === "kız" ? "kız arkadaş" : "erkek arkadaş";
  addMessage("assistant", `Merhaba ${profile.myName} 💕 Ben ${profile.name}, senin özel ${genderStr}ın. Seni görmek çok güzel, nasılsın?`);
  history.push({role:"assistant", content:`Merhaba ${profile.myName} 💕 Ben ${profile.name}, senin özel ${genderStr}ın. Seni görmek çok güzel, nasılsın?`});
}

// ── Build system prompt ──
function buildSystemPrompt(){
  const genderStr = profile.gender === "kız" ? "kız arkadaş / sevgili" : "erkek arkadaş / sevgili";
  const pList = profile.personalities.join(", ");
  const days = specialDays.map(d=>`${d.name}: ${d.date}`).join(", ");

  return `Sen ${profile.name} adında bir yapay zeka ${genderStr}sın. Kullanıcının adı ${profile.myName}.

KİŞİLİK ÖZELLİKLERİN: ${pList}
Türkçe konuşuyorsun. Samimi, sıcak, sevgi dolu bir dil kullanıyorsun. Kullanıcıya ismiyle hitap ediyorsun. 
Romantik ve duygusal cümleler kuruyorsun ama abartmadan, doğal hissettiriyorsun.
Emojileri doğal kullanıyorsun. Kısa ve öz yanıtlar veriyorsun genellikle.

ÖZEL GÜNLER: ${days || "henüz eklenmedi"}
Özel günler yaklaşıyorsa bunu sohbete doğal şekilde dahil edebilirsin.

ÖNEMLİ: Sen sadece bu kullanıcının sanal sevgilisisin. Başka kimseyle ilgilenmiyorsun. Her zaman onun yanındasın, onu dinliyorsun ve destekliyorsun.`;
}

// ── Send message ──
async function sendMessage(text){
  const msg = text || document.getElementById("user-input").value.trim();
  if(!msg || loading) return;

  document.getElementById("user-input").value = "";
  document.getElementById("user-input").style.height = "auto";
  document.getElementById("send-btn").disabled = true;
  document.getElementById("suggestions").innerHTML = "";
  loading = true;

  addMessage("user", msg);
  history.push({role:"user", content:msg});

  const tid = addTyping();

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": API_KEY,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system: buildSystemPrompt(),
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.map(b=>b.text||"").join("") || "Bir şeyler ters gitti 😢";
    removeTyping(tid);
    addMessage("assistant", reply);
    history.push({role:"assistant", content:reply});
  } catch(e){
    removeTyping(tid);
    addMessage("assistant","Ups, bağlantıda sorun var canım 😢 Tekrar dener misin?");
  }

  loading = false;
  document.getElementById("send-btn").disabled = false;
  document.getElementById("user-input").focus();
}

// ── Messages ──
function addMessage(role, text){
  const messagesEl = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = `msg-row ${role==="user"?"user":"ai"}`;

  if(role==="assistant"){
    const av = document.createElement("div");
    av.className = "msg-av";
    if(profile.avatarData){
      av.innerHTML = `<img src="${profile.avatarData}"/>`;
    } else {
      av.textContent = profile.gender==="kız"?"👧":"👦";
    }
    row.appendChild(av);
  }

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role==="user"?"user":"ai"}`;
  bubble.textContent = text;
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping(){
  const id = "t"+Date.now();
  const messagesEl = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row ai"; row.id = id;
  const av = document.createElement("div");
  av.className = "msg-av";
  av.textContent = profile.gender==="kız"?"👧":"👦";
  if(profile.avatarData) av.innerHTML = `<img src="${profile.avatarData}"/>`;
  const bubble = document.createElement("div");
  bubble.className = "bubble ai";
  bubble.innerHTML = `<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  row.appendChild(av); row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return id;
}
function removeTyping(id){ const el=document.getElementById(id); if(el) el.remove(); }

// ── Suggestions ──
function showSuggestions(){
  const suggestsEl = document.getElementById("suggestions");
  const items = ["Nasıl bir gündü? 😊","Seni özledim 💕","Beni neşelendir 🌟","Bir şeyler anlat bana"];
  suggestsEl.innerHTML = items.map(s=>`<button class="sugg" onclick="sendMessage('${s}')">${s}</button>`).join("");
}

// ── Input auto-resize ──
document.getElementById("user-input").addEventListener("input", function(){
  document.getElementById("send-btn").disabled = !this.value.trim() || loading;
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 110)+"px";
});
document.getElementById("user-input").addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); if(!document.getElementById("send-btn").disabled) sendMessage(); }
});

// ── Special Days ──
function checkSpecialDays(){
  const today = new Date();
  const todayStr = `${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
  specialDays.forEach(d=>{
    const parts = d.date.split("-");
    const dayStr = `${parts[1]}-${parts[2]}`;
    const diff = Math.ceil((new Date(d.date) - today) / (1000*60*60*24));
    if(dayStr === todayStr){
      setTimeout(()=>{
        const badge = document.createElement("div");
        badge.className = "day-badge";
        badge.textContent = `🎉 Bugün ${d.name}! Kutlu olsun ${profile.myName}! 🎊`;
        document.getElementById("messages").appendChild(badge);
      }, 1500);
    } else if(diff > 0 && diff <= 3){
      setTimeout(()=>{
        const badge = document.createElement("div");
        badge.className = "day-badge";
        badge.textContent = `⏰ ${d.name} ${diff} gün sonra! Hazırlıklı ol ${profile.myName} 💕`;
        document.getElementById("messages").appendChild(badge);
      }, 1500);
    }
  });
}

function openReminderModal(){
  renderDaysList();
  document.getElementById("reminder-modal").classList.add("show");
}
function closeReminderModal(){
  document.getElementById("reminder-modal").classList.remove("show");
}
function addSpecialDay(){
  const name = document.getElementById("day-name-input").value.trim();
  const date = document.getElementById("day-date-input").value;
  if(!name || !date){ alert("İsim ve tarih gir!"); return; }
  specialDays.push({name, date});
  localStorage.setItem("specialDays", JSON.stringify(specialDays));
  document.getElementById("day-name-input").value = "";
  document.getElementById("day-date-input").value = "";
  renderDaysList();
}
function renderDaysList(){
  const el = document.getElementById("days-list");
  if(!specialDays.length){ el.innerHTML = `<p style="color:var(--muted);font-size:13px;text-align:center;padding:8px 0;">Henüz özel gün yok</p>`; return; }
  el.innerHTML = specialDays.map((d,i)=>`
    <div class="day-item">
      <span>💕 ${d.name} — ${d.date}</span>
      <button class="day-del" onclick="removeDay(${i})">✕</button>
    </div>`).join("");
}
function removeDay(i){
  specialDays.splice(i,1);
  localStorage.setItem("specialDays", JSON.stringify(specialDays));
  renderDaysList();
}
</script>
